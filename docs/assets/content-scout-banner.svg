<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1729"/>
      <stop offset="100%" style="stop-color:#1a2744"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="dogFur" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c4a2d"/>
      <stop offset="100%" style="stop-color:#5a3520"/>
    </linearGradient>
    <linearGradient id="whiteFur" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0eb"/>
      <stop offset="100%" style="stop-color:#e8ddd4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
  </g>

  <!-- Decorative dots (scattered content nodes) -->
  <g opacity="0.15">
    <circle cx="80" cy="80" r="4" fill="#3b82f6"/>
    <circle cx="160" cy="320" r="3" fill="#8b5cf6"/>
    <circle cx="350" cy="60" r="5" fill="#3b82f6"/>
    <circle cx="900" cy="90" r="4" fill="#8b5cf6"/>
    <circle cx="1050" cy="340" r="3" fill="#3b82f6"/>
    <circle cx="1120" cy="120" r="4" fill="#8b5cf6"/>
    <circle cx="750" cy="350" r="3" fill="#3b82f6"/>
    <circle cx="950" cy="310" r="5" fill="#3b82f6"/>
  </g>

  <!-- Connection lines between dots -->
  <g opacity="0.06" stroke="#3b82f6" stroke-width="1">
    <line x1="80" y1="80" x2="350" y2="60"/>
    <line x1="350" y1="60" x2="900" y2="90"/>
    <line x1="900" y1="90" x2="1120" y2="120"/>
    <line x1="160" y1="320" x2="750" y2="350"/>
    <line x1="750" y1="350" x2="1050" y2="340"/>
  </g>

  <!-- Dog mascot (stylized pit bull, sitting alert, pointing pose) -->
  <g transform="translate(105, 75) scale(1.1)">
    <!-- Body -->
    <ellipse cx="95" cy="210" rx="65" ry="55" fill="url(#dogFur)"/>
    <!-- White chest -->
    <ellipse cx="95" cy="215" rx="35" ry="45" fill="url(#whiteFur)"/>

    <!-- Front legs -->
    <rect x="60" y="240" width="22" height="65" rx="10" fill="url(#dogFur)"/>
    <rect x="105" y="240" width="22" height="65" rx="10" fill="url(#dogFur)"/>
    <!-- White paws -->
    <ellipse cx="71" cy="305" rx="13" ry="8" fill="url(#whiteFur)"/>
    <ellipse cx="116" cy="305" rx="13" ry="8" fill="url(#whiteFur)"/>

    <!-- Head -->
    <ellipse cx="95" cy="140" rx="52" ry="48" fill="url(#dogFur)"/>
    <!-- White face stripe -->
    <path d="M82 100 Q95 95 108 100 L104 175 Q95 180 86 175 Z" fill="url(#whiteFur)"/>
    <!-- White muzzle -->
    <ellipse cx="95" cy="165" rx="30" ry="20" fill="url(#whiteFur)"/>

    <!-- Ears (floppy) -->
    <path d="M52 120 Q35 100 30 130 Q35 145 55 140 Z" fill="url(#dogFur)"/>
    <path d="M138 120 Q155 100 160 130 Q155 145 135 140 Z" fill="url(#dogFur)"/>

    <!-- Eyes -->
    <ellipse cx="78" cy="138" rx="8" ry="9" fill="#1a1207"/>
    <ellipse cx="112" cy="138" rx="8" ry="9" fill="#1a1207"/>
    <circle cx="81" cy="135" r="3" fill="#ffffff" opacity="0.6"/>
    <circle cx="115" cy="135" r="3" fill="#ffffff" opacity="0.6"/>

    <!-- Nose -->
    <ellipse cx="95" cy="158" rx="10" ry="7" fill="#3d2216"/>
    <ellipse cx="95" cy="156" rx="4" ry="2.5" fill="#1a1207" opacity="0.3"/>

    <!-- Happy mouth / tongue -->
    <path d="M78 168 Q87 178 95 175 Q103 178 112 168" fill="none" stroke="#3d2216" stroke-width="2" stroke-linecap="round"/>
    <!-- Tongue -->
    <path d="M90 175 Q88 192 93 195 Q98 195 97 178 Z" fill="#e8788a"/>

    <!-- Magnifying glass (scout tool) -->
    <g transform="translate(140, 180) rotate(-30)">
      <circle cx="0" cy="0" r="22" fill="none" stroke="#3b82f6" stroke-width="4" opacity="0.85"/>
      <circle cx="0" cy="0" r="18" fill="#3b82f6" opacity="0.08"/>
      <line x1="15" y1="15" x2="35" y2="35" stroke="#3b82f6" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
    </g>

    <!-- Tail (wagging, up) -->
    <path d="M30 195 Q5 170 15 140 Q20 130 25 140" fill="none" stroke="url(#dogFur)" stroke-width="14" stroke-linecap="round"/>
  </g>

  <!-- Text: Content Scout -->
  <text x="380" y="175" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="700" font-size="72" fill="#ffffff" letter-spacing="-1">
    Content Scout
  </text>

  <!-- Accent underline -->
  <rect x="382" y="195" width="220" height="4" rx="2" fill="url(#accent)"/>

  <!-- Tagline -->
  <text x="384" y="235" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="400" font-size="22" fill="#94a3b8">
    Your content hunting dog for the developer ecosystem
  </text>

  <!-- Feature pills -->
  <g transform="translate(384, 268)">
    <rect x="0" y="0" width="80" height="30" rx="15" fill="#3b82f6" opacity="0.15"/>
    <text x="40" y="20" font-family="'Segoe UI', system-ui, sans-serif" font-weight="500" font-size="13" fill="#60a5fa" text-anchor="middle">Scan</text>

    <rect x="92" y="0" width="90" height="30" rx="15" fill="#8b5cf6" opacity="0.15"/>
    <text x="137" y="20" font-family="'Segoe UI', system-ui, sans-serif" font-weight="500" font-size="13" fill="#a78bfa" text-anchor="middle">Report</text>

    <rect x="194" y="0" width="78" height="30" rx="15" fill="#3b82f6" opacity="0.15"/>
    <text x="233" y="20" font-family="'Segoe UI', system-ui, sans-serif" font-weight="500" font-size="13" fill="#60a5fa" text-anchor="middle">Post</text>

    <rect x="284" y="0" width="96" height="30" rx="15" fill="#8b5cf6" opacity="0.15"/>
    <text x="332" y="20" font-family="'Segoe UI', system-ui, sans-serif" font-weight="500" font-size="13" fill="#a78bfa" text-anchor="middle">Analyze</text>

    <rect x="392" y="0" width="88" height="30" rx="15" fill="#3b82f6" opacity="0.15"/>
    <text x="436" y="20" font-family="'Segoe UI', system-ui, sans-serif" font-weight="500" font-size="13" fill="#60a5fa" text-anchor="middle">Trends</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="394" width="1200" height="6" fill="url(#accent)"/>
</svg>