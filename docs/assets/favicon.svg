<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="fur" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7c4a2d"/>
      <stop offset="100%" stop-color="#5a3520"/>
    </linearGradient>
    <linearGradient id="white" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5f0eb"/>
      <stop offset="100%" stop-color="#e8ddd4"/>
    </linearGradient>
    <linearGradient id="hat" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square background -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>

  <!-- Dog head + hat, centered in the tile -->
  <g transform="translate(32, 38)">
    <!-- Ears (floppy) -->
    <path d="M-22 -4 Q-30 -12 -30 2 Q-26 8 -18 4 Z" fill="url(#fur)"/>
    <path d="M22 -4 Q30 -12 30 2 Q26 8 18 4 Z" fill="url(#fur)"/>

    <!-- Head -->
    <ellipse cx="0" cy="0" rx="22" ry="20" fill="url(#fur)"/>
    <!-- White face stripe -->
    <path d="M-6 -16 Q0 -18 6 -16 L4 16 Q0 18 -4 16 Z" fill="url(#white)"/>
    <!-- White muzzle -->
    <ellipse cx="0" cy="10" rx="13" ry="8" fill="url(#white)"/>

    <!-- Eyes -->
    <ellipse cx="-8" cy="-1" rx="3.2" ry="3.6" fill="#1a1207"/>
    <ellipse cx="8" cy="-1" rx="3.2" ry="3.6" fill="#1a1207"/>
    <circle cx="-7" cy="-2.3" r="1.1" fill="#ffffff" opacity="0.7"/>
    <circle cx="9" cy="-2.3" r="1.1" fill="#ffffff" opacity="0.7"/>

    <!-- Nose -->
    <ellipse cx="0" cy="7.5" rx="4.2" ry="2.8" fill="#3d2216"/>

    <!-- Happy mouth -->
    <path d="M-7 12 Q-2 16 0 14 Q2 16 7 12" fill="none" stroke="#3d2216" stroke-width="1.4" stroke-linecap="round"/>

    <!-- Red hat, jauntily tilted -->
    <g transform="translate(0, -18) rotate(-6)">
      <!-- brim -->
      <ellipse cx="0" cy="0" rx="22" ry="4.2" fill="#7f1d1d"/>
      <!-- cap body -->
      <path d="M-18 -1 Q-20 -13 -10 -18 Q0 -22 10 -20 Q18 -17 19 -10 Q20 -3 17 -1 Z" fill="url(#hat)"/>
      <!-- sheen -->
      <path d="M-13 -15 Q-4 -19 7 -18 Q13 -16 15 -12 Q6 -16 -3 -17 Q-8 -17 -13 -15 Z" fill="#ef4444" opacity="0.45"/>
      <!-- pom-pom -->
      <circle cx="2" cy="-19" r="2.6" fill="#dc2626"/>
      <circle cx="1.2" cy="-19.8" r="0.9" fill="#fca5a5" opacity="0.6"/>
    </g>
  </g>
</svg>
