name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:  # allow deploy.yml to reuse this pipeline

jobs:
  test:
    name: Test hosted agent
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            hosted/requirements.txt
            hosted/requirements-test.txt

      - name: Install test dependencies
        # Install only runtime deps needed for tests (skip foundry hosting adapter,
        # which is pre-release-only and not required for unit/integration tests).
        run: |
          python -m pip install --upgrade pip
          pip install httpx python-dotenv azure-identity
          pip install -r requirements-test.txt

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short

  lint:
    name: Lint markdown + YAML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate agent.yaml
        run: |
          python -c "import yaml; yaml.safe_load(open('hosted/agent.yaml'))"
          python -c "import yaml; yaml.safe_load(open('hosted/azure.yaml'))"

      - name: Check prompt files exist
        run: |
          test -f .github/agents/content-scout.agent.md
          test -f .github/prompts/scout-onboard.prompt.md
          test -f .github/prompts/scout-scan.prompt.md
          test -f .github/prompts/scout-post.prompt.md
          test -f .github/prompts/scout-calendar.prompt.md
          test -f .github/prompts/scout-gaps.prompt.md
          test -f .github/prompts/scout-trends.prompt.md
