name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint prompt + agent files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check prompt files exist
        run: |
          test -f .github/agents/content-scout.agent.md
          test -f .github/prompts/scout-onboard.prompt.md
          test -f .github/prompts/scout-scan.prompt.md
          test -f .github/prompts/scout-post.prompt.md
          test -f .github/prompts/scout-calendar.prompt.md
          test -f .github/prompts/scout-trends.prompt.md

  test:
    name: Web UI unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install web UI dependencies
        working-directory: tools/web-ui
        run: npm install --no-audit --no-fund

      - name: Syntax check
        working-directory: tools/web-ui
        run: |
          node --check server.js
          for f in lib/*.js public/*.js; do node --check "$f"; done

      - name: Run unit tests
        working-directory: tools/web-ui
        run: npm test
