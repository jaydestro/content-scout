# Content Scout — Hosted Agent
# Azure Developer CLI (azd) deployment configuration.
#
# `azd up` provisions end-to-end in a single command:
#   - User-assigned Managed Identity (zero secrets, zero keys)
#   - Azure Container Registry (hosts the agent image)
#   - Azure Key Vault (scanner API keys, RBAC-only access)
#   - Azure Storage Account (persistent reports + dedup; key auth disabled)
#   - Log Analytics workspace (diagnostics, audit logs)
#   - Azure AI Foundry account + project (hosts the agent runtime)
#   - Model deployment (gpt-4o-mini by default; override with MODEL_NAME)
#   - All required role assignments (least-privilege)
#
# Customize the LLM before deploying:
#   azd env set MODEL_NAME gpt-4o
#   azd env set MODEL_VERSION 2024-11-20
#   azd env set MODEL_CAPACITY 100
#   azd up

name: content-scout
metadata:
  template: content-scout-hosted-agent@1.0.0

infra:
  provider: bicep
  path: infra
  module: main

services:
  agent:
    host: ai.agent
    project: .
    language: python
    docker:
      path: ../Dockerfile
      context: ../
