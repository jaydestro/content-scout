# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml
#
# EXPERIMENTAL — Microsoft Foundry Hosted Agents preview. Requires subscription
# enrollment and a supported region. See docs/HOSTED-AGENT.md.

kind: hosted
name: content-scout
description: |
    [EXPERIMENTAL] Content Scout — discovers, catalogs, and promotes public
    developer content about a product or technology across 14+ sources. Filters
    for quality, generates reports with topic tags and trends, and drafts social
    posts. Depends on the Microsoft Foundry Hosted Agents preview.
metadata:
    tags:
        - Agent Framework
        - Content Research
        - Developer Marketing
        - Responses Protocol
protocols:
    - protocol: responses
      version: 1.0.0
resources:
    cpu: "0.5"
    memory: 1Gi
environment_variables:
    - name: MODEL_DEPLOYMENT_NAME
      value: gpt-4o-mini
    - name: SCOUT_CONFIG_PATH
      value: /app/.github/prompts/
    # Scanner API keys — override per-env. In production, store in Key Vault and
    # set AZURE_KEY_VAULT_NAME so scout/secrets.py loads them at startup.
    - name: AZURE_KEY_VAULT_NAME
      value: ""
    - name: AZURE_STORAGE_ACCOUNT_NAME
      value: ""
    - name: YOUTUBE_API_KEY
      value: ""
    - name: REDDIT_CLIENT_ID
      value: ""
    - name: REDDIT_CLIENT_SECRET
      value: ""
    - name: BLUESKY_HANDLE
      value: ""
    - name: BLUESKY_APP_PASSWORD
      value: ""
    - name: X_BEARER_TOKEN
      value: ""
