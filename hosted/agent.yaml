name: content-scout
description: >
  Content research agent that discovers, catalogs, and promotes public content
  about a product, technology, or project across the developer ecosystem.
  Scans 14+ sources, filters for quality, generates reports, and drafts social posts.

template:
  kind: hosted
  protocols:
    - name: responses
      version: v1
    - name: invocations
      version: v1
  sandbox:
    resources:
      cpu: "1"
      memory: 2Gi
  environment_variables:
    - name: AZURE_AI_PROJECT_ENDPOINT
      description: "Foundry project endpoint URL (provisioned by azd up)"
    - name: AZURE_AI_FOUNDRY_ENDPOINT
      description: "Foundry account (Cognitive Services) endpoint"
    - name: MODEL_DEPLOYMENT_NAME
      description: "Model deployment name for LLM calls (e.g., gpt-4o-mini). Provisioned by azd up."
    - name: AZURE_CLIENT_ID
      description: "Managed Identity client ID (set by Foundry runtime)"
    - name: AZURE_KEY_VAULT_NAME
      description: "Key Vault holding scanner API keys (provisioned by azd up)"
    - name: AZURE_KEY_VAULT_ENDPOINT
      description: "Key Vault URL"
    - name: AZURE_STORAGE_ACCOUNT_NAME
      description: "Blob storage account for persistent reports (provisioned by azd up)"
    - name: AZURE_STORAGE_BLOB_ENDPOINT
      description: "Blob storage endpoint"
    - name: SCOUT_CONFIG_PATH
      description: "Path to scout config file(s). Defaults to .github/prompts/"
    # Scanner API keys are loaded from Key Vault at runtime via Managed Identity.
    # The vars below are only for local dev fallback via .env — do NOT set them
    # in production. Store them in Key Vault instead (see docs/HOSTED-AGENT.md).
    - name: YOUTUBE_API_KEY
      description: "Local-dev fallback; production value comes from Key Vault 'youtube-api-key'"
    - name: REDDIT_CLIENT_ID
      description: "Local-dev fallback; production value comes from Key Vault 'reddit-client-id'"
    - name: REDDIT_CLIENT_SECRET
      description: "Local-dev fallback; production value comes from Key Vault 'reddit-client-secret'"
    - name: BLUESKY_HANDLE
      description: "Local-dev fallback; production value comes from Key Vault 'bluesky-handle'"
    - name: BLUESKY_APP_PASSWORD
      description: "Local-dev fallback; production value comes from Key Vault 'bluesky-app-password'"
    - name: X_BEARER_TOKEN
      description: "Local-dev fallback; production value comes from Key Vault 'x-bearer-token'"
